<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medi - Hero Section</title>
  <style>
    body {
      background-image: url("IMAGE\ \(2\).png") ;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-repeat: no-repeat;
      background-size: cover;
    }
    .container {
      width: 100%;
      height: 600px;
      border-radius: 10px;
      padding: 50px;
      position: relative;
      overflow: hidden;
    }
    .logo {
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 40px;
    }
    .content {
      max-width: 400px;
    }
    h1 {
      font-size: 48px;
      color: #fff;
      margin-bottom: 20px;
    }
    p {
      color: #f7f7f7;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .btn {
      background-color: #c86c6c;
      color: white;
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
    }
    .image img {
      width: 100%;
      height: 800px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Medi</div>
    <div class="content">
      <h1>Produire plus juste</h1>
      <p>
        Ensemble cultivons matières, textures et conscience.
        À chaque paire achetée, une paire offerte à une personne dans le besoin.
      </p>
      <button class="btn">DÉCOUVRIR PLUS JUSTE</button>
    </div>
  </div>
</body>
</html>
